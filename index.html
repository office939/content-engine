<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Цифрова Кузня: Контент-Завод</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h1 {
            color: #1a1a1a;
            border-bottom: 2px solid #eaeaea;
            padding-bottom: 10px;
        }
        .section {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: #444;
        }
        input[type="text"], textarea, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
        }
        textarea {
            resize: vertical;
            height: 120px;
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #0056b3;
        }
        .output-box {
            background-color: #f8f9fa;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            padding: 20px;
            margin-top: 25px;
            white-space: pre-wrap;
            min-height: 150px;
        }
        .status {
            font-style: italic;
            color: #666;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🏭 Цифрова кузня: Контент-Завод</h1>
    <p>Перетворення сирого «палива» на системний експертний контент на базі вашої ДНК.</p>
    
    <div class="section">
        <label for="apiKey">OpenAI API Key (Пароль від ШІ):</label>
        <input type="text" id="apiKey" placeholder="sk-proj-...">
    </div>

    <hr style="border: 0; border-top: 1px solid #eee; margin: 25px 0;">

    <div class="section">
        <label for="fuel">🚀 Вхідне «Паливо» (теза, думка, посилання або транскрибація):</label>
        <textarea id="fuel" placeholder="Наприклад: Сьогодні розмовляв з клієнтом, він боїться, що ІІ замінить його копірайтера. Але ІІ без контексту пише пластик. Треба пояснити, що рулить синергія..."></textarea>
    </div>

    <div class="grid class section">
        <div>
            <label for="format">📋 Формат на вихід:</label>
            <select id="format">
                <option value="Пост для Facebook/Instagram (експертний, залучаючий)">Пост Facebook/Instagram</option>
                <option value="Сценарій для Reels/Shorts (з хуком та закликом до дії)">Сценарій Reels/Shorts</option>
                <option value="Email-розсилка (коротка, з фокусом на клік)">Email-розсилка</option>
                <option value="Стаття в блог (структурована, з підзаголовками)">Стаття в блог</option>
                <option value="Скрипт для менеджера (відпрацювання заперечень)">Скрипт для продажів</option>
            </select>
        </div>
        <div>
            <label for="cjmStage">🎯 Етап CJM (Шлях клієнта):</label>
            <select id="cjmStage">
                <option value="Холодний (Знайомство, формування потреби, біль)">Холодний (Формування потреби)</option>
                <option value="Теплий (Порівняння рішень, демонстрація експертності)">Теплий (Довіра та Експертність)</option>
                <option value="Гарячий (Оффер, дедлайн, заклик купити прямо зараз)">Гарячий (Продаж / Оффер)</option>
            </select>
        </div>
    </div>

    <button onclick="generateContent()">Запустити Контент-Завод ⚡</button>

    <div class="status" id="status"></div>

    <div class="section">
        <label>✨ Готовий продукт (пройшов через фільтр вашої ДНК):</label>
        <div class="output-box" id="output">Тут з'явиться згенерований контент...</div>
    </div>
</div>

<script>
// ТУТ МИ «ВШИВАЄМО» ВАШІ 4 БАЗОВІ ФАЙЛИ ЯК КОНСТАНТИ
const PROJECT_DNA = "Ми віримо в автоматизацію з людським обличчям. Ніколи не використовуємо кліше типу 'штучний інтелект захоплює світ'. Наш продукт — налаштування нейромереж під ключ.";
const OFFER_MATRIX = "Головний продукт: Створення індивідуального 'Контент-заводу' за $1000. Цінність: економія 90% часу на копірайтинг.";
const TONE_OF_VOICE = "Стиль: експертний, але простий. Менше води, більше метафор (як-от 'цифрова кузня', 'паливо'). Звертання на 'Ви'. Короткі речення.";

async function generateContent() {
    const apiKey = document.getElementById('apiKey').value;
    const fuel = document.getElementById('fuel').value;
    const format = document.getElementById('format').value;
    const cjmStage = document.getElementById('cjmStage').value;
    
    if (!apiKey) {
        alert('Будь ласка, введіть ваш OpenAI API Key!');
        return;
    }
    if (!fuel) {
        alert('Дайте заводу паливо (введіть ідею чи текст)!');
        return;
    }

    const statusDiv = document.getElementById('status');
    const outputDiv = document.getElementById('output');
    
    statusDiv.innerText = "Завод працює, метал плавиться (генерація)...⏳";
    outputDiv.innerText = "";

    // Формуємо системний промпт, куди інтегруємо всі ваші 4 файли
    const systemPrompt = `Ти — 'Контент-Завод', інтелектуальна цифрова кузня. 
Твоє завдання: переробити сире 'паливо' (ідею користувача) у якісний текст.
Використовуй наступний закритий контекст компанії:
1. ДНК ПРОЕКТУ: ${PROJECT_DNA}
2. МАТРИЦЯ ОФФЕРІВ: ${OFFER_MATRIX}
3. TONE OF VOICE: ${TONE_OF_VOICE}

Дотримуйся заданого формату та етапу CJM. Текст має бути живим, без ШІ-штампів.`;

    const userPrompt = `ФОРМАТ: ${format}
ЕТАП КЛІЄНТА (CJM): ${cjmStage}
ВХІДНЕ ПАЛИВО (Ідея): ${fuel}`;

    try {
        const response = await fetch('https://api.openai.com/v1/chat/completions', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${apiKey}`
            },
            body: JSON.stringify({
                model: 'gpt-4o', // або gpt-4-turbo
                messages: [
                    { role: 'system', content: systemPrompt },
                    { role: 'user', content: userPrompt }
                ],
                temperature: 0.7
            })
        });

        const data = await response.json();
        
        if (data.choices && data.choices[0]) {
            outputDiv.innerText = data.choices[0].message.content;
            statusDiv.innerText = "Готово! Витрачено 30 секунд. Перевірте та публікуйте. ✅";
        } else {
            outputDiv.innerText = "Помилка відповіді від API: " + JSON.stringify(data);
            statusDiv.innerText = "⚠️ Щось пішло не так.";
        }
    } catch (error) {
        outputDiv.innerText = "Помилка з'єднання: " + error.message;
        statusDiv.innerText = "⚠️ Помилка мережі.";
    }
}
</script>

</body>
</html>
